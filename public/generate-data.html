<!DOCTYPE html>
<html>
<head>
  <title>Generate Sample Data</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    button {
      background: linear-gradient(to right, #0ea5e9, #06b6d4);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: #1e293b;
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .info { color: #06b6d4; }
  </style>
</head>
<body>
  <h1>🎓 Generate Sample Student Data</h1>
  <p>This will create sample students, courses, and progress data in your database for testing the dashboards.</p>
  
  <button id="generateBtn" onclick="generateData()">Generate 50 Sample Students</button>
  
  <div id="status"></div>

  <script>
    async function generateData() {
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      status.innerHTML = '<p class="info">🚀 Generating sample data... Please wait...</p>';
      
      try {
        const response = await fetch('/api/generate-sample-data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ count: 50 })
        });
        
        const data = await response.json();
        
        if (data.success) {
          status.innerHTML = `
            <p class="success">✅ Sample data generated successfully!</p>
            <p>${data.message}</p>
            <p class="info">📍 Next steps:</p>
            <ul>
              <li><a href="/teacher-dashboard" style="color: #06b6d4;">View Teacher Dashboard</a></li>
              <li><a href="/analytics" style="color: #06b6d4;">View Enhanced Analytics</a></li>
            </ul>
          `;
        } else {
          status.innerHTML = `<p class="error">❌ Error: ${data.error}</p>`;
          btn.disabled = false;
        }
      } catch (error) {
        status.innerHTML = `<p class="error">❌ Failed: ${error.message}</p>`;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
